<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#071827" />
  <title>Hokusai Training Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow" id="todayLabel">Today</p>
        <h1>Training Log</h1>
        <p class="subtitle">日々進歩 · Daily progression</p>
      </div>
      <button id="themeToggle" class="icon-btn" aria-label="Toggle light and dark mode">☾</button>
    </header>

    <main id="screen" class="screen"></main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button data-view="today" class="nav-btn active"><span>⌂</span>Today</button>
      <button data-view="progress" class="nav-btn"><span>▧</span>Progress</button>
      <button data-view="history" class="nav-btn"><span>☷</span>History</button>
      <button data-view="export" class="nav-btn"><span>⇩</span>Export</button>
      <button data-view="settings" class="nav-btn"><span>⚙</span>Settings</button>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
