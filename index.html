<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#071827" />
  <title>Hokusai Cyber Training Journal</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow" id="todayLabel">Today</p>
        <h1>Training Journal</h1>
        <p class="quote" id="dailyQuote"></p>
      </div>
      <button id="themeToggle" class="icon-btn" aria-label="Toggle light and dark mode">☾</button>
    </header>

    <main id="screen" class="screen"></main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button data-view="today" class="nav-btn active"><span>Home</span></button>
      <button data-view="progress" class="nav-btn"><span>Progress</span></button>
      <button data-view="history" class="nav-btn"><span>History</span></button>
      <button data-view="export" class="nav-btn"><span>Export</span></button>
      <button data-view="settings" class="nav-btn"><span>Settings</span></button>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
