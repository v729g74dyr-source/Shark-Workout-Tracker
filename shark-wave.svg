<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="Blue shark wave artwork">
  <defs>
    <linearGradient id="sea" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b2f55"/>
      <stop offset=".48" stop-color="#125b8f"/>
      <stop offset="1" stop-color="#082238"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
